_format_version: "2.1"

services:
  - name: auth
    url: http://auth:9999
    routes:
      - name: auth-route
        paths:
          - /auth/v1
        strip_path: true

  - name: rest
    url: http://rest:3000
    routes:
      - name: rest-route
        paths:
          - /rest/v1
        strip_path: true

  - name: realtime
    url: http://realtime:4000
    routes:
      - name: realtime-route
        paths:
          - /realtime/v1
        strip_path: true

  - name: storage
    url: http://storage:5000
    routes:
      - name: storage-route
        paths:
          - /storage/v1
        strip_path: true

  - name: meta
    url: http://meta:8080
    routes:
      - name: meta-route
        paths:
          - /pg
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - "http://localhost:3000"
        - "http://localhost:5173"
        - "http://127.0.0.1:5173"
        - "https://studio.supabase.com"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      headers:
        - ACCEPT
        - ACCEPT-PROFILE
        - ACCEPT-VERSION
        - AUTHORIZATION
        - CONTENT-TYPE
        - ORIGIN
        - ACCESS-CONTROL-ALLOW-ORIGIN
        - APIKEY
        - X-CLIENT-INFO
        - X-SUPABASE-API-VERSION
        - CONTENT-PROFILE
        - PREFER
        - RANGE
      exposed_headers:
        - CONTENT-RANGE
        - CONTENT-LENGTH
        - CONTENT-TYPE
        - X-TOTAL-COUNT
      credentials: true
      max_age: 3600
